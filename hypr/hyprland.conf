# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua
$mainMod = SUPER
$terminal = ghostty
$fileManager = dolphin
$menu = fuzzel

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu

exec-once = waybar
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent

env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,ibus

exec-once = fcitx5 --replace -d

xwayland {
    force_zero_scaling = true
}

env = HYPRSHOT_DIR,$HOME/Pictures/Screenshots

# Super + Shift + S = 框选区域截图（最常用）
bind = SUPER SHIFT, S, exec, hyprshot -m region

# Super + Alt + S = 截取当前窗口
bind = SUPER ALT, S, exec, hyprshot -m window

# Super + Ctrl + S = 全屏截图
bind = SUPER CTRL, S, exec, hyprshot -m output

# Super + Shift + C = 框选区域，只复制到剪贴板（不保存文件）
bind = SUPER SHIFT, C, exec, hyprshot -m region --clipboard-only

exec-once = hyprpaper

# 工作区绑定：点击或快捷键启动对应应用
# Super+1~5: 切换/启动应用
bind = $mainMod, 1, exec, /home/horanf/.config/waybar/workspace-click.sh 1
bind = $mainMod, 2, exec, /home/horanf/.config/waybar/workspace-click.sh 2
bind = $mainMod, 3, exec, /home/horanf/.config/waybar/workspace-click.sh 3
bind = $mainMod, 4, exec, /home/horanf/.config/waybar/workspace-click.sh 4
bind = $mainMod, 5, exec, /home/horanf/.config/waybar/workspace-click.sh 5

exec-once = gnome-keyring-daemon --start --components=secrets
